name: Actualizar pagos vencidos (Fase 6)

on:
  schedule:
    # Ejecutar cada 30 minutos entre 09:00 y 23:00 CDMX (CST, UTC-6)
    # Ventana en UTC: 15:00-23:59 y 00:00-05:59
    - cron: '*/30 15-23 * * *'
    - cron: '*/30 0-5 * * *'
  workflow_dispatch:
    # Permitir ejecución manual desde GitHub UI

jobs:
  actualizar-pagos:
    runs-on: ubuntu-latest
    
    steps:
      - name: Llamar API de actualización de pagos
        env:
          APP_URL: ${{ secrets.APP_URL }}
          SECRET: ${{ secrets.REPORTES_CRON_SECRET }}
          BYPASS_TOKEN: ${{ secrets.VERCEL_BYPASS_TOKEN }}
        run: |
          set -euo pipefail
          : "${APP_URL:?Need APP_URL secret (e.g. https://your-app.vercel.app)}"
          : "${SECRET:?Need REPORTES_CRON_SECRET secret}"
          
          echo "🔄 Ejecutando actualización de pagos vencidos..."
          
          CURL_ARGS=(-s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer ${SECRET}" \
            -H "Content-Type: application/json" \
            -H "x-cron-secret: ${SECRET}")
          
          if [ -n "${BYPASS_TOKEN:-}" ]; then
            CURL_ARGS+=(-H "x-vercel-protection-bypass: ${BYPASS_TOKEN}")
          fi
          
          response=$(curl "${CURL_ARGS[@]}" "${APP_URL%/}/api/cron/actualizar-pagos")
          
          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | head -n-1)
          
          echo "📊 HTTP Status: $http_code"
          echo "📋 Response: $body"
          
          if [ "$http_code" != "200" ]; then
            echo "❌ Error: Failed to update payments"
            echo "$body"
            exit 1
          fi
          
          echo "✅ Pagos actualizados exitosamente"

      - name: Notificar resultado (opcional)
        if: failure()
        run: |
          echo "⚠️ La actualización de pagos falló. Revisar logs."
          # TODO: Aquí podrías agregar notificación por email o Slack si es necesario
