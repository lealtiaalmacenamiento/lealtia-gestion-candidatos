name: Cumpleaños (birthday emails)

on:
  schedule:
    - cron: '0 18 * * *' # 12:00 PM CDMX (UTC-6, México no tiene horario de verano)
  workflow_dispatch:

jobs:
  send-birthday-emails:
    runs-on: ubuntu-latest
    steps:
      - name: Call /api/cron/cumpleanos
        env:
          URL: ${{ secrets.APP_URL }}
          SECRET: ${{ secrets.REPORTES_CRON_SECRET }}
        run: |
          set -euo pipefail
          : "${URL:?Need APP_URL secret (e.g. https://your-app.vercel.app)}"
          : "${SECRET:?Need REPORTES_CRON_SECRET secret}"
          curl -sS -X POST "${URL%/}/api/cron/cumpleanos" \
            -H "Authorization: Bearer ${SECRET}" \
            -H 'content-type: application/json' \
            -w '\nHTTP %{http_code}\n'
